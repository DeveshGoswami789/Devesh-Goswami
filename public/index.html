<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Devesh Chat Pro</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #111;
            color: white;
            margin: 0;
            display: flex;
            height: 100vh;
        }
        
        #sidebar {
            width: 300px;
            background: #1e1e1e;
            border-right: 1px solid #2d2d2d;
            display: flex;
            flex-direction: column;
        }
        
        .app-branding-header {
            display: flex;
            align-items: center;
            gap: 10px;
            background: #202020;
            padding: 15px;
            border-bottom: 1px solid #2d2d2d;
        }
        .app-branding-header img {
            width: 30px;
            height: 30px;
            object-fit: contain;
        }
        .app-branding-header h2 {
            margin: 0;
            font-size: 18px;
            background: transparent;
            padding: 0;
            text-align: left;
        }

        #mainChat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: #111;
            position: relative;
        }
        
        #chatHeader {
            text-align: center;
            background: #202020;
            margin: 0;
            padding: 15px;
            font-size: 18px;
        }
        
        .list-section-title {
            padding: 10px;
            background: #141414;
            font-size: 12px;
            color: #aaa;
            text-transform: uppercase;
        }
        .user-item {
            padding: 15px;
            border-bottom: 1px solid #252525;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: 0.2s;
        }
        .user-item:hover, .user-item.active {
            background: #2b2b2b;
        }
        .status-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #555;
        }
        .status-dot.online {
            background: #8cff8c;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 15px;
            display: flex;
            flex-direction: column;
        }
        .message {
            max-width: 70%;
            padding: 10px;
            border-radius: 15px;
            margin: 6px 0;
            word-wrap: break-word;
            cursor: pointer;
            position: relative;
        }
        .mine { align-self: flex-end; background: #005c4b; }
        .other { align-self: flex-start; background: #2b2b2b; }
        .name { font-size: 12px; font-weight: bold; margin-bottom: 3px; }
        .time { font-size: 11px; opacity: .7; text-align: right; margin-top: 4px; }
        .system { color: #aaa; text-align: center; margin: 10px 0; }
        
        #bottom { display: flex; padding: 10px; background: #202020; }
        input { flex: 1; padding: 12px; border: none; outline: none; border-radius: 10px; font-size: 16px; background: #2a2a2a; color: white;}
        button { padding: 12px 20px; margin-left: 5px; cursor: pointer; border: none; border-radius: 10px; background: #00a884; color: white; font-weight: bold; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            #sidebar { width: 100%; height: 35vh; border-right: none; border-bottom: 1px solid #2d2d2d; }
            #mainChat { height: 65vh; }
            .message { max-width: 85%; }
        }

        #menuContainer { position: absolute; top: 15px; right: 15px; z-index: 10; }
        #menuBtn { background: none; color: white; font-size: 24px; padding: 5px; cursor: pointer; border: none;}
        #menu { display: none; position: absolute; right: 0; top: 45px; background: #222; border-radius: 10px; overflow: hidden; min-width: 140px; }
        #menu button { width: 100%; margin: 0; border-radius: 0; text-align: left; background: #222; }
        #menu button:hover { background: #333; }
        
        .voiceMessage { display: flex; align-items: center; gap: 10px; background: #1f2c34; padding: 8px 12px; border-radius: 18px; margin-top: 5px; width: 220px; }
        .voiceMessage button { width: 38px; height: 38px; padding: 0; border-radius: 50%; font-size: 18px; flex-shrink: 0; }
        .voiceWave { flex: 1; font-size: 16px; letter-spacing: 2px; color: #8cff8c; overflow: hidden; white-space: nowrap; }
    </style>
</head>
<body>

<div id="sidebar">
    <div class="app-branding-header">
        <img src="favicon.png" alt="App Icon" onerror="this.style.display='none'">
        <h2>Devesh Chat Pro</h2>
    </div>

    <div class="list-section-title">Global Room</div>
    <div class="user-item active" id="globalChatItem" onclick="changeChatTarget('global')">
        <span>🌍 Global Public Chat</span>
        <div class="status-dot online"></div>
    </div>
    
    <div class="list-section-title">All Visited Users (DMs)</div>
    <div id="usersListContainer" style="overflow-y: auto; flex: 1;"></div>
</div>

<div id="mainChat">
    <h2 id="chatHeader">🌍 Global Public Chat</h2>

    <div id="menuContainer">
        <button id="menuBtn" onclick="toggleMenu()">⋮</button>
        <div id="menu">
            <button onclick="toggleTheme()">🌙 Theme</button>
            <button onclick="logout()">🚪 Logout</button>
        </div>
    </div>

    <div id="pinnedMessage" style="display:none; background:#333; padding:10px; text-align:center; border-bottom:2px solid #00a884; z-index: 5;">
        📌 <span id="pinnedText"></span>
        <button onclick="unpinMessage()" style="margin-left:10px; padding:4px 8px;">❌</button>
    </div>

    <div id="chat"></div>

    <div id="typing" style="padding:5px 15px; color:#aaa; font-style:italic; height:20px;"></div>

    <div id="replyBox" style="display:none; padding:8px 15px; background:#222; border-left:4px solid #00a884; display: flex; justify-content: space-between; align-items: center;">
        <div id="replyText"></div>
        <button onclick="cancelReply()" style="padding: 5px 10px; background: #c62828;">✖</button>
    </div>

    <div id="voicePreview" style="display:none; padding:10px; background:#222;">
        <audio id="voicePlayer" controls></audio>
        <button onclick="deleteVoice()">🗑️</button>
        <button onclick="sendVoice()">📤</button>
    </div>

    <div id="bottom">
        <input id="messageInput" placeholder="Type a message...">
        <input type="file" id="fileInput" accept="image/*" style="display:none">
        <button onclick="document.getElementById('fileInput').click()">📷</button>
        <button id="recordBtn">🎤</button>
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<div id="messageMenu" style="display:none; position:fixed; background:#222; border-radius:10px; padding:5px; z-index:9999; min-width:180px; box-shadow: 0px 4px 10px rgba(0,0,0,0.5);">
    <button id="editBtn" onclick="editMessage()" style="width:100%; margin:2px 0; text-align:left; border-radius:5px;">✏️ Edit</button>
    <button onclick="copyMessage()" style="width:100%; margin:2px 0; text-align:left; border-radius:5px;">📋 Copy</button>
    <button onclick="pinMessage()" style="width:100%; margin:2px 0; text-align:left; border-radius:5px;">📌 Pin</button>
    <button onclick="reactMessage()" style="width:100%; margin:2px 0; text-align:left; border-radius:5px;">😂 React</button>
    <button id="deleteBtn" onclick="deleteMessage()" style="width:100%; margin:2px 0; text-align:left; border-radius:5px; background: #c62828;">🗑️ Delete</button>
</div>

<div id="emojiPicker" style="display:none; position:fixed; background:#222; padding:10px; border-radius:10px; z-index:10000; box-shadow: 0px 4px 10px rgba(0,0,0,0.5);">
    <span onclick="addReaction('👍')" style="cursor:pointer; padding:5px; font-size:22px;">👍</span>
    <span onclick="addReaction('❤️')" style="cursor:pointer; padding:5px; font-size:22px;">❤️</span>
    <span onclick="addReaction('😂')" style="cursor:pointer; padding:5px; font-size:22px;">😂</span>
    <span onclick="addReaction('😮')" style="cursor:pointer; padding:5px; font-size:22px;">😮</span>
    <span onclick="addReaction('😢')" style="cursor:pointer; padding:5px; font-size:22px;">😢</span>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const msgSound = new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");
const joinSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
const leaveSound = new Audio("https://actions.google.com/sounds/v1/cartoon/concussive_hit_guitar_boing.ogg");

const socket = io();

let currentChatTarget = "global"; 
let replyTo = null;
let darkMode = true;
let selectedMessage = null;
let selectedDiv = null;
let pressTimer;
let mediaRecorder;
let audioChunks = [];
let stream;
let recordedBlob = null;

let username = localStorage.getItem("username");
if(!username){
    username = prompt("Choose a username") || "Anonymous";
    localStorage.setItem("username", username);
}

socket.emit("new user", username);

function changeChatTarget(target) {
    currentChatTarget = target;
    cancelReply();
    closeAllMenus();
    
    document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
    if(target === 'global') {
        document.getElementById('globalChatItem').classList.add('active');
        document.getElementById('chatHeader').textContent = "🌍 Global Public Chat";
    } else {
        const activeUserEl = document.getElementById(`user-${target}`);
        if(activeUserEl) activeUserEl.classList.add('active');
        document.getElementById('chatHeader').textContent = `🔒 Chat with ${target}`;
    }

    socket.emit("switch room", target);
}

socket.on("update user lists", (data) => {
    const container = document.getElementById("usersListContainer");
    container.innerHTML = "";

    data.allVisited.forEach(user => {
        if(user === username) return;

        const isOnline = data.online.includes(user);
        const userDiv = document.createElement("div");
        userDiv.className = `user-item ${currentChatTarget === user ? 'active' : ''}`;
        userDiv.id = `user-${user}`;
        userDiv.onclick = () => changeChatTarget(user);

        userDiv.innerHTML = `
            <span>👤 ${user}</span>
            <div class="status-dot ${isOnline ? 'online' : ''}"></div>
        `;
        container.appendChild(userDiv);
    });
});

function toggleMenu(){
    const menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function toggleTheme(){
    if(darkMode){
        document.body.style.background = "#ffffff";
        document.body.style.color = "#000000";
        document.getElementById("sidebar").style.background = "#f0f0f0";
        darkMode = false;
    }else{
        document.body.style.background = "#111";
        document.body.style.color = "#fff";
        document.getElementById("sidebar").style.background = "#1e1e1e";
        darkMode = true;
    }
    closeAllMenus();
}

function closeAllMenus() {
    document.getElementById("messageMenu").style.display = "none";
    document.getElementById("emojiPicker").style.display = "none";
    document.getElementById("menu").style.display = "none";
}

function showMessageMenu(x, y){
    const menu = document.getElementById("messageMenu");
    document.getElementById("editBtn").style.display = selectedMessage.user === username ? "block" : "none";
    document.getElementById("deleteBtn").style.display = selectedMessage.user === username ? "block" : "none";
    
    menu.style.display = "block";
    
    const menuWidth = menu.offsetWidth || 180;
    const menuHeight = menu.offsetHeight || 180;

    let left = x;
    let top = y;

    if(left + menuWidth > window.innerWidth){ left = window.innerWidth - menuWidth - 15; }
    if(top + menuHeight > window.innerHeight){ top = window.innerHeight - menuHeight - 15; }
    if(left < 10){ left = 10; }
    if(top < 10){ top = 10; }

    menu.style.left = left + "px";
    menu.style.top = top + "px";
}

document.addEventListener("click", (e) => {
    if(!e.target.closest('#messageMenu') && !e.target.closest('#emojiPicker') && !e.target.closest('#menuBtn')){
        closeAllMenus();
    }
});

function editMessage(){
    const newText = prompt("Edit message:", selectedMessage.text);
    if(newText && newText.trim() !== ""){
        socket.emit("edit message", { id: selectedMessage.id, text: newText });
    }
    closeAllMenus(); // Auto remove menu after click
}

function copyMessage(){
    if(selectedMessage && selectedMessage.text) navigator.clipboard.writeText(selectedMessage.text);
    closeAllMenus(); // Auto remove menu after click
}

function pinMessage(){
    if(selectedMessage && selectedMessage.text) socket.emit("pin message", selectedMessage.text);
    closeAllMenus(); // Auto remove menu after click
}

function unpinMessage(){ 
    socket.emit("unpin message"); 
    closeAllMenus();
}

function reactMessage(){
    const menu = document.getElementById("messageMenu");
    const picker = document.getElementById("emojiPicker");
    
    picker.style.display = "block";
    picker.style.left = menu.style.left;
    picker.style.top = (parseInt(menu.style.top) - 45) + "px";
    menu.style.display = "none"; // Hide main menu, show emojis
}

window.addReaction = function(emoji) {
    socket.emit("reaction", { messageId: selectedMessage.id, emoji });
    closeAllMenus(); // Auto remove emoji tray after react
}

function deleteMessage(){ 
    socket.emit("delete message", selectedMessage.id); 
    closeAllMenus(); // Auto remove menu after click
}

function setReply(text){
    replyTo = text;
    document.getElementById("replyText").textContent = "Replying to: " + text;
    document.getElementById("replyBox").style.display = "flex";
}

function cancelReply(){
    replyTo = null;
    document.getElementById("replyBox").style.display = "none";
}

function sendMessage() {
    const input = document.getElementById("messageInput");
    if(input.value.trim() !== "") {
        socket.emit("chat message", {
            id: Date.now() + Math.random(),
            text: input.value,
            time: Date.now(),
            reply: replyTo
        });
        cancelReply();
        input.value = "";
    }
}

document.getElementById("messageInput").addEventListener("keypress", e => {
    if(e.key === "Enter") { sendMessage(); }
});

document.getElementById("messageInput").addEventListener("input", () => {
    socket.emit("typing", username);
});

document.getElementById("fileInput").addEventListener("change", async function(){
    const file = this.files[0];
    if(!file) return;
    const formData = new FormData();
    formData.append("file", file);

    try {
        const res = await fetch("/upload", { method:"POST", body:formData });
        const data = await res.json();
        socket.emit("chat message", {
            id: Date.now() + Math.random(),
            image: data.url,
            time: Date.now()
        });
    } catch(err) { console.error(err); }
});

function deleteVoice(){
    recordedBlob = null;
    document.getElementById("voicePreview").style.display = "none";
    document.getElementById("voicePlayer").src = "";
}

async function sendVoice(){
    if(!recordedBlob) return;
    const formData = new FormData();
    formData.append("file", recordedBlob, "voice.webm");

    try {
        const res = await fetch("/upload", { method:"POST", body:formData });
        const data = await res.json();
        socket.emit("chat message", {
            id: Date.now() + Math.random(),
            audio: data.url,
            time: Date.now()
        });
        deleteVoice();
    } catch(err) { console.error(err); }
}

function formatTime(time){
    return new Date(time).toLocaleTimeString([],{ hour:"2-digit", minute:"2-digit" });
}

function createMessageHTML(data){
    return `
        ${data.reply ? `<div style="font-size:12px; color:#8cff8c; border-left:3px solid #8cff8c; padding-left:5px; margin-bottom:5px;">${data.reply}</div>` : ""}
        <div class="name">${data.user}</div>
        ${data.text ? `<div class="messageText">${data.text}</div>` : ""}
        ${data.image ? `<img src="${data.image}" style="max-width:250px; border-radius:10px; margin-top:5px;">` : ""}
        ${data.audio ? `
        <div class="voiceMessage">
            <button class="playBtn" onclick="const audio=this.parentElement.querySelector('audio'); if(audio.paused){audio.play(); this.innerHTML='⏸️';}else{audio.pause(); this.innerHTML='▶️';}">▶️</button>
            <div class="voiceWave">▁▂▃▄▅▆▇▆▅▄▃▂</div>
            <audio onended="this.parentElement.querySelector('.playBtn').innerHTML='▶️'"><source src="${data.audio}" type="audio/webm"></audio>
        </div>` : ""}
        <div class="time">${formatTime(data.time)}</div>
        <div class="seenBy" style="font-size:11px; opacity:.7; margin-top:3px;"></div>
        <div class="reactions" style="margin-top:4px; display:flex; flex-wrap:wrap; gap:4px;"></div>
    `;
}

function logout(){
    localStorage.removeItem("username");
    location.reload();
}

document.getElementById("recordBtn").addEventListener("click", async ()=>{
    if(!mediaRecorder || mediaRecorder.state === "inactive"){
        try {
            stream = await navigator.mediaDevices.getUserMedia({ audio:true });
            audioChunks = [];
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async ()=>{
                recordedBlob = new Blob(audioChunks, { type:"audio/webm" });
                document.getElementById("voicePlayer").src = URL.createObjectURL(recordedBlob);
                document.getElementById("voicePreview").style.display = "block";
                stream.getTracks().forEach(track => track.stop());
            };
            mediaRecorder.start();
            document.getElementById("recordBtn").textContent = "⏹️";
        } catch(err) { alert(err.message); }
    }else{
        mediaRecorder.stop();
        document.getElementById("recordBtn").textContent = "🎤";
    }
});

function setupMessageEvents(div, data) {
    let startX = 0;

    div.addEventListener("touchstart", e => { startX = e.changedTouches[0].clientX; });
    div.addEventListener("touchend", e => {
        let endX = e.changedTouches[0].clientX;
        if(endX - startX > 60) { 
            const textToReply = data.text || (data.image ? "📷 Photo" : "🎤 Voice Note");
            setReply(data.user + ": " + textToReply); 
        }
    });

    div.addEventListener("contextmenu", (e) => {
        e.preventDefault(); 
        selectedMessage = data; 
        selectedDiv = div; 
        showMessageMenu(e.pageX, e.pageY);
    });

    div.addEventListener("touchstart", (e) => {
        pressTimer = setTimeout(() => {
            selectedMessage = data; 
            selectedDiv = div; 
            showMessageMenu(e.touches[0].pageX, e.touches[0].pageY);
        }, 500);
    });

    div.addEventListener("touchend", () => { clearTimeout(pressTimer); });
    
    div.addEventListener("dblclick", () => { 
        const textToReply = data.text || (data.image ? "📷 Photo" : "🎤 Voice Note");
        setReply(data.user + ": " + textToReply); 
    });
}

socket.on("chat message", data => {
    if(data.user !== username){ msgSound.play(); }
    const div = document.createElement("div");
    div.dataset.id = data.id;

    setTimeout(()=>{
        if(data.user !== username){ socket.emit("message seen", { messageId: data.id, user: username }); }
    },1000);

    div.className = "message " + (data.user === username ? "mine" : "other");
    div.innerHTML = createMessageHTML(data);
    
    setupMessageEvents(div, data);

    document.getElementById("chat").appendChild(div);
    div.scrollIntoView();
});

socket.on("system", msg => {
    const div = document.createElement("div");
    div.className = "system";
    if(msg.includes("joined")) joinSound.play();
    if(msg.includes("left")) leaveSound.play();
    div.textContent = msg;
    document.getElementById("chat").appendChild(div);
    div.scrollIntoView();
});

socket.on("typing", user => {
    const typing = document.getElementById("typing");
    typing.textContent = user + " is typing...";
    clearTimeout(typing.timeout);
    typing.timeout = setTimeout(() => { typing.textContent = ""; }, 1500);
});

socket.on("delete message", (id) => { const msg = document.querySelector(`[data-id="${id}"]`); if(msg) msg.remove(); });
socket.on("message seen", (data)=>{
    const msg = document.querySelector(`[data-id="${data.messageId}"]`);
    if(msg && msg.querySelector(".seenBy")) msg.querySelector(".seenBy").textContent = "Seen by: " + data.users.join(", ");
});

socket.on("reaction update", (data) => {
    const msg = document.querySelector(`[data-id="${data.messageId}"]`);
    if(!msg) return;
    const box = msg.querySelector(".reactions");
    if(!box) return;
    box.innerHTML = "";
    for(const emoji in data.reactions){
        const count = data.reactions[emoji].length;
        if(count > 0) box.innerHTML += `<span style="background:#333; padding:2px 6px; border-radius:10px; font-size:14px;">${emoji} ${count}</span>`;
    }
});

socket.on("edit message", (data) => {
    const msg = document.querySelector(`[data-id="${data.id}"]`);
    if(msg && msg.querySelector(".messageText")) msg.querySelector(".messageText").textContent = data.text + " (edited)";
});

socket.on("pin message", (text) => {
    document.getElementById("pinnedText").textContent = text;
    document.getElementById("pinnedMessage").style.display = "block";
});
socket.on("unpin message", () => { document.getElementById("pinnedMessage").style.display = "none"; });

socket.on("chat history", (messages) => {
    const chat = document.getElementById("chat");
    chat.innerHTML = "";
    messages.forEach((data) => {
        const div = document.createElement("div");
        div.dataset.id = data.id;
        div.className = "message " + (data.user === username ? "mine" : "other");
        div.innerHTML = createMessageHTML(data);
        
        setupMessageEvents(div, data);
        
        chat.appendChild(div);
    });
    chat.scrollTop = chat.scrollHeight;
});
</script>
</body>
</html>
