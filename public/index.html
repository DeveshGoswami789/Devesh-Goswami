<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="icon" type="image/png" href="favicon.png">

<title>Devesh Chat</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
    margin:0;
}

h2{
    text-align:center;
    background:#202020;
    margin:0;
    padding:15px;
}

#users{
    text-align:center;
    padding:8px;
    color:#8cff8c;
    background:#181818;
}

#chat{
    height:75vh;
    overflow-y:auto;
    padding:15px;
    display:flex;
    flex-direction:column;
}

.message{
    max-width:70%;
    padding:10px;
    border-radius:15px;
    margin:6px 0;
    word-wrap:break-word;
}

.mine{
    align-self:flex-end;
    background:#005c4b;
}

.other{
    align-self:flex-start;
    background:#2b2b2b;
}

.name{
    font-size:12px;
    font-weight:bold;
    margin-bottom:3px;
}

.time{
    font-size:11px;
    opacity:.7;
    text-align:right;
    margin-top:4px;
}

.system{
    color:#aaa;
    text-align:center;
    margin:10px 0;
}

#bottom{
    display:flex;
    padding:10px;
    background:#202020;
}

input{
    flex:1;
    padding:10px;
    border:none;
    outline:none;
}

button{
    padding:10px 20px;
    margin-left:5px;
    cursor:pointer;
}
input{
    flex:1;
    padding:12px;
    border:none;
    outline:none;
    border-radius:10px;
    font-size:16px;
}

button{
    padding:12px 20px;
    margin-left:5px;
    cursor:pointer;
    border:none;
    border-radius:10px;
    background:#00a884;
    color:white;
    font-weight:bold;
}

@media (max-width: 600px){

    h2{
        font-size:20px;
        padding:12px;
    }

    #users{
        font-size:14px;
    }

    #chat{
        height:68vh;
        padding:10px;
    }

    .message{
        max-width:85%;
        font-size:15px;
    }

    #bottom{
        padding:8px;
    }

    input{
        font-size:16px;
    }

    button{
        padding:12px 15px;
    }
}
#menuContainer{
    position:absolute;
    top:15px;
    right:15px;
}

#menuBtn{
    background:none;
    color:white;
    font-size:28px;
    padding:5px 10px;
}

#menu{
    display:none;
    position:absolute;
    right:0;
    top:45px;
    background:#222;
    border-radius:10px;
    overflow:hidden;
    min-width:140px;
}

#menu button{
    width:100%;
    margin:0;
    border-radius:0;
    text-align:left;
    background:#222;
}

#menu button:hover{
    background:#333;
}
</style>

</head>

<body>

<h2>
    <img src="logo.png"
         style="height:55px;vertical-align:middle;margin-right:10px;">
    Devesh Chat
</h2>
<div id="menuContainer">

    <button id="menuBtn"
    onclick="toggleMenu()">
        ⋮
    </button>

    <div id="menu">

        <button onclick="toggleTheme()">
            🌙 Theme
        </button>

        <button onclick="logout()">
            🚪 Logout
        </button>

    </div>

</div>

<div id="users">
    🟢 Online Users
    <div id="userList"></div>
</div>

<div id="chat"></div>
<div
id="typing"
style="
padding:5px 15px;
color:#aaa;
font-style:italic;
height:20px;
">
</div>
<div id="replyBox"
style="
display:none;
padding:8px 15px;
background:#222;
border-left:4px solid #00a884;
">
    <div id="replyText"></div>
    <button onclick="cancelReply()">✖</button>
</div>

<div id="bottom">
    <input id="messageInput" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();
let replyTo = null;
let darkMode = true;

let username = localStorage.getItem("username");

if(!username){

    username =
    prompt("Choose a username") || "Anonymous";

    localStorage.setItem(
        "username",
        username
    );
}

socket.emit("new user", username);
function toggleMenu(){

    const menu =
    document.getElementById(
        "menu"
    );

    menu.style.display =
    menu.style.display === "block"
    ? "none"
    : "block";
}

function toggleTheme(){

    if(darkMode){

        document.body.style.background =
        "#ffffff";

        document.body.style.color =
        "#000000";

        document.querySelector("h2")
        .style.background =
        "#e5e5e5";

        document.getElementById("users")
        .style.background =
        "#f0f0f0";

        document.getElementById("bottom")
        .style.background =
        "#e5e5e5";

        document.getElementById("typing")
        .style.color =
        "#555";

        document.getElementById("menu")
        .style.background =
        "#f0f0f0";

        darkMode = false;

    }else{

        document.body.style.background =
        "#111";

        document.body.style.color =
        "#fff";

        document.querySelector("h2")
        .style.background =
        "#202020";

        document.getElementById("users")
        .style.background =
        "#181818";

        document.getElementById("bottom")
        .style.background =
        "#202020";

        document.getElementById("typing")
        .style.color =
        "#aaa";

        document.getElementById("menu")
        .style.background =
        "#222";

        darkMode = true;
    }
}
function logout(){

    localStorage.removeItem("username");

    location.reload();
}
function setReply(text){

    replyTo = text;

    document.getElementById(
        "replyText"
    ).textContent =
    "Replying to: " + text;

    document.getElementById(
        "replyBox"
    ).style.display =
    "block";
}

function cancelReply(){

    replyTo = null;

    document.getElementById(
        "replyBox"
    ).style.display =
    "none";
}

function sendMessage() {

    const input =
    document.getElementById("messageInput");

    if(input.value.trim() !== "") {

        socket.emit("chat message", {
    user: username,
    text: input.value,
    time: Date.now(),
    reply: replyTo
});
cancelReply();

        input.value = "";
    }
}

document
.getElementById("messageInput")
.addEventListener("keypress", e => {
    if(e.key === "Enter") {
        sendMessage();
    }
});
document
.getElementById("messageInput")
.addEventListener("input", () => {

    socket.emit(
        "typing",
        username
    );
});

socket.on("chat message", data => {

    const div =
    document.createElement("div");
let startX = 0;

div.addEventListener(
    "touchstart",
    e => {

        startX =
        e.changedTouches[0].clientX;
    }
);

div.addEventListener(
    "touchend",
    e => {

        let endX =
        e.changedTouches[0].clientX;

        if(endX - startX > 80){

            setReply(
                data.user +
                ": " +
                data.text
            );
        }
    }
);
div.addEventListener(
    "dblclick",
    () => {

        setReply(
            data.user +
            ": " +
            data.text
        );
    }
);

    div.className =
        "message " +
        (data.user === username
        ? "mine"
        : "other");

    const time =
        data.time
        ? new Date(data.time)
            .toLocaleTimeString([],{
                hour:"2-digit",
                minute:"2-digit"
            })
        : "";

    div.innerHTML = `

    ${data.reply ? `
    <div style="
        font-size:12px;
        color:#8cff8c;
        border-left:3px solid #8cff8c;
        padding-left:5px;
        margin-bottom:5px;
    ">
        ${data.reply}
    </div>
    ` : ""}

    <div class="name">${data.user}</div>
    <div>${data.text}</div>
    <div class="time">${time}</div>
`;

    document
    .getElementById("chat")
    .appendChild(div);

    div.scrollIntoView();
});

socket.on("system", msg => {

    const div =
    document.createElement("div");

    div.className = "system";

    div.textContent = msg;

    document
    .getElementById("chat")
    .appendChild(div);

    div.scrollIntoView();
});

socket.on("online users", users => {

    document.getElementById(
        "userList"
    ).innerHTML =
    users.join("<br>");
});
socket.on("typing", user => {

    const typing =
    document.getElementById(
        "typing"
    );

    typing.textContent =
    user + " is typing...";

    clearTimeout(
        typing.timeout
    );

    typing.timeout =
    setTimeout(() => {

        typing.textContent =
        "";

    }, 1500);
});
</script>

</body>
</html>
