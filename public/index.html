<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="icon" type="image/png" href="favicon.png">
    <title>Devesh Chat Pro</title>
    <style>
        /* CSS Variables for Full-Screen Dark/Light Theme Switching */
        :root {
            --bg-body: #111b21;
            --bg-sidebar: #111b21;
            --bg-header: #202c33;
            --bg-chat: #0b141a;
            --border-color: #222d34;
            --text-main: #e9edef;
            --text-sub: #8696a0;
            --bg-item-hover: #202c33;
            --bg-input: #2a3942;
            --msg-mine: #005c4b;
            --msg-other: #202c33;
        }

        [data-theme="light"] {
            --bg-body: #ffffff;
            --bg-sidebar: #ffffff;
            --bg-header: #f0f2f5;
            --bg-chat: #efeae2;
            --border-color: #e9edef;
            --text-main: #111b21;
            --text-sub: #667781;
            --bg-item-hover: #f0f2f5;
            --bg-input: #ffffff;
            --msg-mine: #d9fdd3;
            --msg-other: #ffffff;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background: var(--bg-body);
            color: var(--text-main);
            display: flex;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            transition: background 0.3s, color 0.3s;
        }
        
        /* Sidebar Layout */
        #sidebar {
            width: 340px;
            background: var(--bg-sidebar);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            transition: background 0.3s;
        }
        
        .app-branding-header {
            display: flex;
            align-items: center;
            gap: 12px;
            background: var(--bg-header);
            padding: 16px;
            border-bottom: 1px solid var(--border-color);
            height: 62px;
        }
        .app-branding-header img {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            object-fit: cover;
        }
        .app-branding-header h2 {
            font-size: 18px;
            font-weight: 600;
        }

        /* Main Chat Window Layout */
        #mainChat {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: var(--bg-chat);
            position: relative;
            transition: background 0.3s;
            overflow: hidden;
        }
        
        .chat-top-bar {
            display: flex;
            align-items: center;
            background: var(--bg-header);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-color);
            height: 62px;
            position: relative;
        }
        #backBtn {
            display: none;
            background: none;
            border: none;
            color: #00a884;
            font-size: 22px;
            cursor: pointer;
            margin-right: 12px;
        }
        #chatHeader {
            font-size: 16px;
            font-weight: 600;
            flex: 1;
        }
        
        .list-section-title {
            padding: 12px 16px;
            background: var(--bg-sidebar);
            font-size: 12px;
            color: #00a884;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        
        .user-item {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border-color);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: space-between;
            transition: background 0.2s;
            -webkit-tap-highlight-color: transparent;
        }
        .user-item:hover, .user-item.active {
            background: var(--bg-item-hover);
        }
        .user-item span {
            font-size: 15px;
            font-weight: 500;
        }
        
        .status-badge-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .status-dot {
            width: 9px;
            height: 9px;
            border-radius: 50%;
            background: #74808a;
        }
        .status-dot.online {
            background: #00e676;
        }
        
        .msg-badge {
            background: #00a884;
            color: white;
            font-size: 11px;
            font-weight: bold;
            padding: 2px 7px;
            border-radius: 12px;
            min-width: 18px;
            text-align: center;
        }

        #chat {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .message {
            max-width: 65%;
            padding: 8px 12px;
            border-radius: 8px;
            margin: 4px 0;
            word-wrap: break-word;
            position: relative;
            box-shadow: 0 1px 0.5px rgba(0,0,0,0.13);
        }
        .mine { 
            align-self: flex-end; 
            background: var(--msg-mine); 
            color: var(--text-main);
            border-top-right-radius: 0;
        }
        .other { 
            align-self: flex-start; 
            background: var(--msg-other); 
            color: var(--text-main);
            border-top-left-radius: 0;
        }
        .name { font-size: 12px; font-weight: bold; margin-bottom: 3px; color: #00a884; }
        .time { font-size: 10px; opacity: .6; text-align: right; margin-top: 4px; }
        .system { color: var(--text-sub); text-align: center; margin: 12px 0; font-size: 13px; }
        
        /* 🛠️ FIXED BOTTOM INPUT PANEL FOR SCREEN COMPLIANCE */
        #bottom { 
            display: flex; 
            align-items: center;
            padding: 10px 12px; 
            background: var(--bg-header); 
            gap: 8px;
            width: 100%;
            max-width: 100%;
            overflow: hidden;
            box-sizing: border-box;
            flex-shrink: 0;
        }
        #bottom input { 
            flex: 1; 
            min-width: 0; /* Prevents input from pushing buttons out of screen */
            padding: 11px 14px; 
            border: none; 
            outline: none; 
            border-radius: 8px; 
            font-size: 15px; 
            background: var(--bg-input); 
            color: var(--text-main);
        }
        #bottom button { 
            padding: 11px 14px; 
            cursor: pointer; 
            border: none; 
            border-radius: 8px; 
            background: #00a884; 
            color: white; 
            font-weight: bold; 
            flex-shrink: 0; /* Button will never shrink or get compressed */
        }
        .icon-btn {
            background: transparent !important;
            color: var(--text-sub) !important;
            font-size: 18px !important;
            padding: 6px 4px !important;
        }

        /* 📱 EXTREMELY STABLE MOBILE VIEW RULES */
        @media (max-width: 768px) {
            #sidebar {
                width: 100%;
                display: flex;
            }
            #mainChat {
                position: fixed;
                top: 0;
                left: 0;
                width: 100%;
                height: 100%;
                z-index: 99;
                display: none; 
            }
            body.chat-open #mainChat {
                display: flex; 
            }
            #backBtn { 
                display: block; 
            }
            .message { 
                max-width: 85%; 
            }
            #bottom {
                padding: 8px 10px;
                gap: 6px;
            }
        }

        #menuContainer { position: absolute; top: 14px; right: 16px; z-index: 105; }
        #menuBtn { background: none; color: var(--text-sub); font-size: 22px; padding: 4px; cursor: pointer; border: none;}
        #menu { display: none; position: absolute; right: 0; top: 40px; background: var(--bg-header); border: 1px solid var(--border-color); border-radius: 8px; overflow: hidden; min-width: 140px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
        #menu button { width: 100%; margin: 0; border-radius: 0; text-align: left; background: transparent; color: var(--text-main); padding: 10px 16px; border: none; cursor: pointer;}
        #menu button:hover { background: var(--bg-item-hover); }
        
        .voiceMessage { display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.1); padding: 8px 12px; border-radius: 8px; margin-top: 5px; width: 220px; }
        .voiceMessage button { width: 32px; height: 32px; padding: 0; border-radius: 50%; font-size: 14px; flex-shrink: 0; }
        .voiceWave { flex: 1; font-size: 14px; color: #00a884; overflow: hidden; white-space: nowrap; letter-spacing: 1px;}
    </style>
</head>
<body>

<div id="sidebar">
    <div class="app-branding-header">
        <img src="favicon.png" alt="App Icon" onerror="this.style.display='none'">
        <h2>Devesh Chat Pro</h2>
    </div>

    <div class="list-section-title">Global Room</div>
    <div class="user-item active" id="globalChatItem" onclick="changeChatTarget('global')">
        <span>🌍 Global Public Chat</span>
        <div class="status-badge-container">
            <div class="status-dot online"></div>
            <div id="badge-global" class="msg-badge" style="display: none;">0</div>
        </div>
    </div>
    
    <div class="list-section-title">All Chats (DMs)</div>
    <div id="usersListContainer" style="overflow-y: auto; flex: 1;"></div>
</div>

<div id="mainChat">
    <div class="chat-top-bar">
        <button id="backBtn" onclick="backToContactList()">⬅️</button>
        <h2 id="chatHeader">🌍 Global Public Chat</h2>
        
        <div id="menuContainer">
            <button id="menuBtn" onclick="toggleMenu()">⋮</button>
            <div id="menu">
                <button onclick="toggleTheme()">🌓 Theme Mode</button>
                <button onclick="logout()">🚪 Logout</button>
            </div>
        </div>
    </div>

    <div id="pinnedMessage" style="display:none; background:var(--bg-header); padding:10px; text-align:center; border-bottom:2px solid #00a884; z-index: 5;">
        📌 <span id="pinnedText"></span>
        <button onclick="unpinMessage()" style="margin-left:10px; padding:4px 8px;">❌</button>
    </div>

    <div id="chat"></div>
    <div id="typing" style="padding:5px 20px; color:var(--text-sub); font-style:italic; height:20px; font-size:13px;"></div>

    <div id="replyBox" style="display:none; padding:8px 15px; background:var(--bg-header); border-left:4px solid #00a884; display: flex; justify-content: space-between; align-items: center;">
        <div id="replyText"></div>
        <button onclick="cancelReply()" style="padding: 5px 10px; background: #f44336; color:white; border:none; border-radius:4px;">✖</button>
    </div>

    <div id="voicePreview" style="display:none; padding:10px; background:var(--bg-header);">
        <audio id="voicePlayer" controls></audio>
        <button onclick="deleteVoice()">🗑️</button>
        <button onclick="sendVoice()">📤</button>
    </div>

    <div id="bottom">
        <input id="messageInput" placeholder="Type a message...">
        <input type="file" id="fileInput" accept="image/*" style="display:none">
        <button onclick="document.getElementById('fileInput').click()" class="icon-btn">📷</button>
        <button id="recordBtn" class="icon-btn">🎤</button>
        <button onclick="sendMessage()">Send</button>
    </div>
</div>

<div id="messageMenu" style="display:none; position:fixed; background:var(--bg-header); border:1px solid var(--border-color); border-radius:8px; padding:4px; z-index:9999; min-width:160px; box-shadow: 0px 4px 12px rgba(0,0,0,0.3);">
    <button id="editBtn" onclick="editMessage()" style="width:100%; text-align:left; background:transparent; color:var(--text-main); border:none; padding:8px; cursor:pointer;">✏️ Edit</button>
    <button onclick="copyMessage()" style="width:100%; text-align:left; background:transparent; color:var(--text-main); border:none; padding:8px; cursor:pointer;">📋 Copy</button>
    <button onclick="pinMessage()" style="width:100%; text-align:left; background:transparent; color:var(--text-main); border:none; padding:8px; cursor:pointer;">📌 Pin</button>
    <button onclick="reactMessage()" style="width:100%; text-align:left; background:transparent; color:var(--text-main); border:none; padding:8px; cursor:pointer;">😂 React</button>
    <button id="deleteBtn" onclick="deleteMessage()" style="width:100%; text-align:left; background:#f44336; color:white; border:none; padding:8px; cursor:pointer; border-radius:4px; margin-top:4px;">🗑️ Delete</button>
</div>

<div id="emojiPicker" style="display:none; position:fixed; background:var(--bg-header); border:1px solid var(--border-color); padding:8px; border-radius:8px; z-index:10000; box-shadow: 0px 4px 12px rgba(0,0,0,0.3);">
    <span onclick="addReaction('👍')" style="cursor:pointer; padding:4px; font-size:20px;">👍</span>
    <span onclick="addReaction('❤️')" style="cursor:pointer; padding:4px; font-size:20px;">❤️</span>
    <span onclick="addReaction('😂')" style="cursor:pointer; padding:4px; font-size:20px;">😂</span>
    <span onclick="addReaction('😮')" style="cursor:pointer; padding:4px; font-size:20px;">😮</span>
    <span onclick="addReaction('😢')" style="cursor:pointer; padding:4px; font-size:20px;">😢</span>
</div>

<script src="/socket.io/socket.io.js"></script>
<script>
const msgSound = new Audio("https://actions.google.com/sounds/v1/cartoon/pop.ogg");
const joinSound = new Audio("https://actions.google.com/sounds/v1/cartoon/wood_plank_flicks.ogg");
const leaveSound = new Audio("https://actions.google.com/sounds/v1/cartoon/concussive_hit_guitar_boing.ogg");

const socket = io();

let currentChatTarget = "global"; 
let replyTo = null;
let currentTheme = "dark";
let selectedMessage = null;
let selectedDiv = null;
let pressTimer;
let mediaRecorder;
let audioChunks = [];
let stream;
let recordedBlob = null;

let unreadCounts = {}; 
let onlineUsersCache = [];

let username = localStorage.getItem("username");
if(!username){
    username = prompt("Choose a username") || "Anonymous";
    localStorage.setItem("username", username);
}

socket.emit("new user", username);

function updateBadgeDOM(target) {
    const badge = document.getElementById(`badge-${target}`);
    if (!badge) return;
    
    const count = unreadCounts[target] || 0;
    if (count > 0) {
        badge.textContent = count;
        badge.style.display = "inline-block";
    } else {
        badge.style.display = "none";
    }
}

function changeChatTarget(target) {
    currentChatTarget = target;
    cancelReply();
    closeAllMenus();
    
    unreadCounts[target] = 0;
    updateBadgeDOM(target);
    
    document.querySelectorAll('.user-item').forEach(el => el.classList.remove('active'));
    if(target === 'global') {
        document.getElementById('globalChatItem').classList.add('active');
        document.getElementById('chatHeader').textContent = "🌍 Global Public Chat";
    } else {
        const activeUserEl = document.getElementById(`user-${target}`);
        if(activeUserEl) activeUserEl.classList.add('active');
        document.getElementById('chatHeader').textContent = `🔒 Chat with ${target}`;
    }

    document.body.classList.add("chat-open");
    document.getElementById("chat").innerHTML = ""; 
    socket.emit("switch room", target);
}

function backToContactList() {
    document.body.classList.remove("chat-open");
}

socket.on("update user lists", (data) => {
    onlineUsersCache = data.online;
    const container = document.getElementById("usersListContainer");
    container.innerHTML = "";

    data.allVisited.forEach(user => {
        if(user === username) return;

        const isOnline = data.online.includes(user);
        const userDiv = document.createElement("div");
        userDiv.className = `user-item ${currentChatTarget === user && document.body.classList.contains('chat-open') ? 'active' : ''}`;
        userDiv.id = `user-${user}`;
        userDiv.onclick = () => changeChatTarget(user);

        const badgeCount = unreadCounts[user] || 0;

        userDiv.innerHTML = `
            <span>👤 ${user}</span>
            <div class="status-badge-container">
                <div class="status-dot ${isOnline ? 'online' : ''}"></div>
                <div id="badge-${user}" class="msg-badge" style="display: ${badgeCount > 0 ? 'inline-block' : 'none'};">${badgeCount}</div>
            </div>
        `;
        container.appendChild(userDiv);
    });
});

function toggleMenu(){
    const menu = document.getElementById("menu");
    menu.style.display = menu.style.display === "block" ? "none" : "block";
}

function toggleTheme(){
    if(currentTheme === "dark"){
        document.documentElement.setAttribute("data-theme", "light");
        currentTheme = "light";
    } else {
        document.documentElement.removeAttribute("data-theme");
        currentTheme = "dark";
    }
    closeAllMenus();
}

// Global window close handler for dynamic UI adjustments
window.onclick = function(event) {
    if (!event.target.matches('#menuBtn')) {
        closeAllMenus();
    }
}

function closeAllMenus() {
    document.getElementById("messageMenu").style.display = "none";
    document.getElementById("emojiPicker").style.display = "none";
    document.getElementById("menu").style.display = "none";
}

function showMessageMenu(x, y){
    const menu = document.getElementById("messageMenu");
    document.getElementById("editBtn").style.display = selectedMessage.user === username ? "block" : "none";
    document.getElementById("deleteBtn").style.display = selectedMessage.user === username ? "block" : "none";
    
    menu.style.display = "block";
    
    const menuWidth = menu.offsetWidth || 160;
    const menuHeight = menu.offsetHeight || 160;

    let left = x;
    let top = y;

    if(left + menuWidth > window.innerWidth){ left = window.innerWidth - menuWidth - 15; }
    if(top + menuHeight > window.innerHeight){ top = window.innerHeight - menuHeight - 15; }
    
    menu.style.left = left + "px";
    menu.style.top = top + "px";
}

document.addEventListener("click", (e) => {
    if(!e.target.closest('#messageMenu') && !e.target.closest('#emojiPicker') && !e.target.closest('#menuBtn')){
        closeAllMenus();
    }
});

function editMessage(){
    const newText = prompt("Edit message:", selectedMessage.text);
    if(newText && newText.trim() !== ""){
        socket.emit("edit message", { id: selectedMessage.id, text: newText });
    }
    closeAllMenus();
}

function copyMessage(){
    if(selectedMessage && selectedMessage.text) navigator.clipboard.writeText(selectedMessage.text);
    closeAllMenus();
}

function pinMessage(){
    if(selectedMessage && selectedMessage.text) socket.emit("pin message", selectedMessage.text);
    closeAllMenus();
}

function unpinMessage(){ 
    socket.emit("unpin message"); 
    closeAllMenus();
}

function reactMessage(){
    const menu = document.getElementById("messageMenu");
    const picker = document.getElementById("emojiPicker");
    
    picker.style.display = "block";
    picker.style.left = menu.style.left;
    picker.style.top = (parseInt(menu.style.top) - 45) + "px";
    menu.style.display = "none";
}

window.addReaction = function(emoji) {
    socket.emit("reaction", { messageId: selectedMessage.id, emoji });
    closeAllMenus();
}

function deleteMessage(){ 
    socket.emit("delete message", selectedMessage.id); 
    closeAllMenus();
}

function setReply(text){
    replyTo = text;
    document.getElementById("replyText").textContent = "Replying to: " + text;
    document.getElementById("replyBox").style.display = "flex";
}

function cancelReply(){
    replyTo = null;
    document.getElementById("replyBox").style.display = "none";
}

function sendMessage() {
    const input = document.getElementById("messageInput");
    if(input.value.trim() !== "") {
        socket.emit("chat message", {
            id: Date.now() + Math.random(),
            text: input.value,
            time: Date.now(),
            reply: replyTo
        });
        cancelReply();
        input.value = "";
    }
}

document.getElementById("messageInput").addEventListener("keypress", e => {
    if(e.key === "Enter") { sendMessage(); }
});

document.getElementById("messageInput").addEventListener("input", () => {
    socket.emit("typing", username);
});

document.getElementById("fileInput").addEventListener("change", async function(){
    const file = this.files[0];
    if(!file) return;
    const formData = new FormData();
    formData.append("file", file);

    try {
        const res = await fetch("/upload", { method:"POST", body:formData });
        const data = await res.json();
        socket.emit("chat message", {
            id: Date.now() + Math.random(),
            image: data.url,
            time: Date.now()
        });
    } catch(err) { console.error(err); }
});

function deleteVoice(){
    recordedBlob = null;
    document.getElementById("voicePreview").style.display = "none";
    document.getElementById("voicePlayer").src = "";
}

async function sendVoice(){
    if(!recordedBlob) return;
    const formData = new FormData();
    formData.append("file", recordedBlob, "voice.webm");

    try {
        const res = await fetch("/upload", { method:"POST", body:formData });
        const data = await res.json();
        socket.emit("chat message", {
            id: Date.now() + Math.random(),
            audio: data.url,
            time: Date.now()
        });
        deleteVoice();
    } catch(err) { console.error(err); }
}

function formatTime(time){
    return new Date(time).toLocaleTimeString([],{ hour:"2-digit", minute:"2-digit" });
}

function createMessageHTML(data) {
    return `
        ${data.reply ? `<div style="font-size:12px; color:#00a884; border-left:3px solid #00a884; padding-left:5px; margin-bottom:5px;">${data.reply}</div>` : ""}
        <div class="name">${data.user}</div>
        ${data.text ? `<div class="messageText">${data.text}</div>` : ""}
        ${data.image ? `<img src="${data.image}" style="max-width:100%; border-radius:8px; margin-top:5px;">` : ""}
        ${data.audio ? `
        <div class="voiceMessage">
            <button class="playBtn" onclick="const audio=this.parentElement.querySelector('audio'); if(audio.paused){audio.play(); this.innerHTML='⏸️';}else{audio.pause(); this.innerHTML='▶️';}">▶️</button>
            <div class="voiceWave">▁▂▃▄▅▆▇▆</div>
            <audio onended="this.parentElement.querySelector('.playBtn').innerHTML='▶️'"><source src="${data.audio}" type="audio/webm"></audio>
        </div>` : ""}
        <div class="time">${formatTime(data.time)}</div>
        <div class="seenBy" style="font-size:10px; opacity:.6; margin-top:3px;"></div>
        <div class="reactions" style="margin-top:4px; display:flex; flex-wrap:wrap; gap:4px;"></div>
    `;
}

function logout(){
    localStorage.removeItem("username");
    location.reload();
}

document.getElementById("recordBtn").addEventListener("click", async ()=>{
    if(!mediaRecorder || mediaRecorder.state === "inactive"){
        try {
            stream = await navigator.mediaDevices.getUserMedia({ audio:true });
            audioChunks = [];
            mediaRecorder = new MediaRecorder(stream);
            mediaRecorder.ondataavailable = e => audioChunks.push(e.data);
            mediaRecorder.onstop = async ()=>{
                recordedBlob = new Blob(audioChunks, { type:"audio/webm" });
                document.getElementById("voicePlayer").src = URL.createObjectURL(recordedBlob);
                document.getElementById("voicePreview").style.display = "block";
                stream.getTracks().forEach(track => track.stop());
            };
            mediaRecorder.start();
            document.getElementById("recordBtn").textContent = "⏹️";
        } catch(err) { alert(err.message); }
    }else{
        mediaRecorder.stop();
        document.getElementById("recordBtn").textContent = "🎤";
    }
});

function setupMessageEvents(div, data) {
    let startX = 0;
    div.addEventListener("touchstart", e => { startX = e.changedTouches[0].clientX; });
    div.addEventListener("touchend", e => {
        let endX = e.changedTouches[0].clientX;
        if(endX - startX > 60) { 
            const textToReply = data.text || (data.image ? "📷 Photo" : "🎤 Voice Note");
            setReply(data.user + ": " + textToReply); 
        }
    });

    div.addEventListener("contextmenu", (e) => {
        e.preventDefault(); 
        selectedMessage = data; 
        selectedDiv = div; 
        showMessageMenu(e.pageX, e.pageY);
    });

    div.addEventListener("touchstart", (e) => {
        pressTimer = setTimeout(() => {
            selectedMessage = data; 
            selectedDiv = div; 
            showMessageMenu(e.touches[0].pageX, e.touches[0].pageY);
        }, 500);
    });
    div.addEventListener("touchend", () => { clearTimeout(pressTimer); });
    
    div.addEventListener("dblclick", () => { 
        const textToReply = data.text || (data.image ? "📷 Photo" : "🎤 Voice Note");
        setReply(data.user + ": " + textToReply); 
    });
}

socket.on("chat message", data => {
    let msgOriginRoom = data.room || "global";
    
    if (msgOriginRoom !== "global") {
        if (data.user !== username) {
            msgOriginRoom = data.user;
        } else {
            msgOriginRoom = currentChatTarget;
        }
    }
    
    const isChatOpen = document.body.classList.contains("chat-open");
    
    if (msgOriginRoom !== currentChatTarget || !isChatOpen) {
        if (data.user !== username) {
            unreadCounts[msgOriginRoom] = (unreadCounts[msgOriginRoom] || 0) + 1;
            updateBadgeDOM(msgOriginRoom);
            msgSound.play();
        }
        return; 
    }

    if(data.user !== username){ msgSound.play(); }
    const div = document.createElement("div");
    div.dataset.id = data.id;

    setTimeout(()=>{
        if(data.user !== username){ socket.emit("message seen", { messageId: data.id, user: username }); }
    },1000);

    div.className = "message " + (data.user === username ? "mine" : "other");
    div.innerHTML = createMessageHTML(data);
    
    setupMessageEvents(div, data);

    document.getElementById("chat").appendChild(div);
    div.scrollIntoView();
});

socket.on("system", msg => {
    const div = document.createElement("div");
    div.className = "system";
    if(msg.includes("joined")) joinSound.play();
    if(msg.includes("left")) leaveSound.play();
    div.textContent = msg;
    document.getElementById("chat").appendChild(div);
    div.scrollIntoView();
});

socket.on("typing", user => {
    const typing = document.getElementById("typing");
    typing.textContent = user + " is typing...";
    clearTimeout(typing.timeout);
    typing.timeout = setTimeout(() => { typing.textContent = ""; }, 1500);
});

socket.on("delete message", (id) => { const msg = document.querySelector(`[data-id="${id}"]`); if(msg) msg.remove(); });
socket.on("message seen", (data)=>{
    const msg = document.querySelector(`[data-id="${data.messageId}"]`);
    if(msg && msg.querySelector(".seenBy")) msg.querySelector(".seenBy").textContent = "Seen by: " + data.users.join(", ");
});

socket.on("reaction update", (data) => {
    const msg = document.querySelector(`[data-id="${data.messageId}"]`);
    if(!msg) return;
    const box = msg.querySelector(".reactions");
    if(!box) return;
    box.innerHTML = "";
    for(const emoji in data.reactions){
        const count = data.reactions[emoji].length;
        if(count > 0) box.innerHTML += `<span style="background:rgba(0,0,0,0.2); padding:2px 6px; border-radius:10px; font-size:12px;">${emoji} ${count}</span>`;
    }
});

socket.on("edit message", (data) => {
    const msg = document.querySelector(`[data-id="${data.id}"]`);
    if(msg && msg.querySelector(".messageText")) msg.querySelector(".messageText").textContent = data.text + " (edited)";
});

socket.on("pin message", (text) => {
    document.getElementById("pinnedText").textContent = text;
    document.getElementById("pinnedMessage").style.display = "block";
});
socket.on("unpin message", () => { document.getElementById("pinnedMessage").style.display = "none"; });

socket.on("chat history", (messages) => {
    const chat = document.getElementById("chat");
    chat.innerHTML = "";
    messages.forEach((data) => {
        const div = document.createElement("div");
        div.dataset.id = data.id;
        div.className = "message " + (data.user === username ? "mine" : "other");
        div.innerHTML = createMessageHTML(data);
        setupMessageEvents(div, data);
        chat.appendChild(div);
    });
    chat.scrollTop = chat.scrollHeight;
});
</script>
</body>
</html>
