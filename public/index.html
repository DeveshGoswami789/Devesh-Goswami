<!DOCTYPE html>

<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Devesh Chat</title>

<style>
body{
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
    margin:0;
}

h2{
    text-align:center;
    background:#202020;
    margin:0;
    padding:15px;
}

#users{
    text-align:center;
    padding:8px;
    color:#8cff8c;
    background:#181818;
}

#chat{
    height:75vh;
    overflow-y:auto;
    padding:15px;
    display:flex;
    flex-direction:column;
}

.message{
    max-width:70%;
    padding:10px;
    border-radius:15px;
    margin:6px 0;
    word-wrap:break-word;
}

.mine{
    align-self:flex-end;
    background:#005c4b;
}

.other{
    align-self:flex-start;
    background:#2b2b2b;
}

.name{
    font-size:12px;
    font-weight:bold;
    margin-bottom:3px;
}

.time{
    font-size:11px;
    opacity:.7;
    text-align:right;
    margin-top:4px;
}

.system{
    color:#aaa;
    text-align:center;
    margin:10px 0;
}

#bottom{
    display:flex;
    padding:10px;
    background:#202020;
}

input{
    flex:1;
    padding:10px;
    border:none;
    outline:none;
}

button{
    padding:10px 20px;
    margin-left:5px;
    cursor:pointer;
}
input{
    flex:1;
    padding:12px;
    border:none;
    outline:none;
    border-radius:10px;
    font-size:16px;
}

button{
    padding:12px 20px;
    margin-left:5px;
    cursor:pointer;
    border:none;
    border-radius:10px;
    background:#00a884;
    color:white;
    font-weight:bold;
}

@media (max-width: 600px){

    h2{
        font-size:20px;
        padding:12px;
    }

    #users{
        font-size:14px;
    }

    #chat{
        height:68vh;
        padding:10px;
    }

    .message{
        max-width:85%;
        font-size:15px;
    }

    #bottom{
        padding:8px;
    }

    input{
        font-size:16px;
    }

    button{
        padding:12px 15px;
    }
}
</style>

</head>

<body>

<h2>💬 Devesh Chat</h2>

<div style="text-align:center;padding:8px;background:#181818;">
    <button onclick="logout()">Logout</button>
</div>

<div id="users">Online Users: 0</div>

<div id="chat"></div>

<div id="bottom">
    <input id="messageInput" placeholder="Type a message...">
    <button onclick="sendMessage()">Send</button>
</div>

<script src="/socket.io/socket.io.js"></script>

<script>
const socket = io();

let username = localStorage.getItem("username");

if(!username){

    username =
    prompt("Choose a username") || "Anonymous";

    localStorage.setItem(
        "username",
        username
    );
}

socket.emit("new user", username);

function logout(){

    localStorage.removeItem("username");

    location.reload();
}

function sendMessage() {

    const input =
    document.getElementById("messageInput");

    if(input.value.trim() !== "") {

        socket.emit("chat message", {
            user: username,
            text: input.value,
            time: Date.now()
        });

        input.value = "";
    }
}

document
.getElementById("messageInput")
.addEventListener("keypress", e => {
    if(e.key === "Enter") {
        sendMessage();
    }
});

socket.on("chat message", data => {

    const div =
    document.createElement("div");

    div.className =
        "message " +
        (data.user === username
        ? "mine"
        : "other");

    const time =
        data.time
        ? new Date(data.time)
            .toLocaleTimeString([],{
                hour:"2-digit",
                minute:"2-digit"
            })
        : "";

    div.innerHTML = `
        <div class="name">${data.user}</div>
        <div>${data.text}</div>
        <div class="time">${time}</div>
    `;

    document
    .getElementById("chat")
    .appendChild(div);

    div.scrollIntoView();
});

socket.on("system", msg => {

    const div =
    document.createElement("div");

    div.className = "system";

    div.textContent = msg;

    document
    .getElementById("chat")
    .appendChild(div);

    div.scrollIntoView();
});

socket.on("users count", count => {
    document.getElementById("users")
    .textContent =
    "Online Users: " + count;
});
</script>

</body>
</html>
